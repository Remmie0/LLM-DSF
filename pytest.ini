[pytest]
# Test discovery rules
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Console output format
console_output_style = progress

# Show local variables in tracebacks
showlocals = true

# Warnings settings
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    error::RuntimeWarning

# Test execution settings
addopts =
    --strict-markers
    --tb=short
    -v
    -ra
    --cache-clear

# Custom markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    gpu: marks tests that require GPU
    container: marks tests that require Docker container

# Timeout settings
timeout = 300

# Coverage settings
[coverage:run]
branch = True
source = .
omit =
    tests/*
    setup.py
    */__init__.py
    */migrations/*
    */tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass
    raise ImportError
    except ImportError:
show_missing = True
skip_covered = True
